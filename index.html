<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galdakao C.D. · Benjamín F7</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap');

:root{
  --ink:#16181c;
  --paper:#f5f4ef;
  --card:#ffffff;
  --stripe:#1b1e23;
  --gold:#d9a441;
  --green:#2f6b4f;
  --red:#b8433a;
  --line:#e1ddd2;
  --muted:#726f66;
  --shadow: 0 1px 2px rgba(22,24,28,0.06), 0 8px 24px -12px rgba(22,24,28,0.18);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  background-image:
    repeating-linear-gradient(180deg, transparent 0 2px, rgba(22,24,28,0.015) 2px 4px);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;
  padding-bottom:80px;
}
.mono{font-family:'IBM Plex Mono',monospace;}
h1,h2,h3,.display{font-family:'Teko',sans-serif; font-weight:600; letter-spacing:0.01em;}

/* ---------- HEADER ---------- */
header.top{
  background:var(--stripe);
  background-image: repeating-linear-gradient(90deg, #101215 0 14px, #22262c 14px 28px);
  color:#fff;
  padding:22px 18px 26px;
  position:relative;
  overflow:hidden;
}
header.top::after{
  content:"";
  position:absolute; left:0; right:0; bottom:0; height:5px;
  background:var(--gold);
}
.crest{
  width:48px;height:58px;
  flex-shrink:0;
  object-fit:contain;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.35));
}
.top-row{display:flex; align-items:center; gap:14px; justify-content:space-between;}
.top-left{display:flex; align-items:center; gap:14px;}
.top-text h1{font-size:34px; line-height:0.85; margin:0 0 2px; color:#fff;}
.top-text p{margin:0; font-size:13px; letter-spacing:0.08em; text-transform:uppercase; color:#d8b96f; font-weight:600;}
.top-right{display:flex; align-items:center; gap:8px;}
.icon-btn{
  background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.25); color:#fff;
  border-radius:8px; padding:8px 10px; font-size:16px; cursor:pointer; line-height:1;
}
.icon-btn.locked{ color:#d8b96f; border-color:#d8b96f; }
.icon-btn.unlocked{ background:var(--green); border-color:var(--green); }
#modeLabel{ font-size:9.5px; letter-spacing:.05em; text-transform:uppercase; color:#c9c6bc; font-weight:700; display:block; text-align:right; margin-bottom:3px;}

/* ---------- NAV ---------- */
nav.tabs{
  display:flex; gap:0; background:var(--card);
  border-bottom:1px solid var(--line);
  position:sticky; top:0; z-index:20;
  box-shadow: var(--shadow);
  overflow-x:auto;
}
nav.tabs button{
  flex:1; min-width:82px; border:none; background:none; cursor:pointer;
  padding:13px 6px 10px; font-family:'Inter',sans-serif; font-weight:700; font-size:11.5px;
  letter-spacing:0.04em; text-transform:uppercase; color:var(--muted);
  border-bottom:3px solid transparent;
}
nav.tabs button.active{ color:var(--ink); border-bottom-color:var(--gold); }

main{ max-width:840px; margin:0 auto; padding:18px 14px 10px; }
.hidden{display:none !important;}

/* ---------- SECTION HEAD ---------- */
.section-head{ display:flex; align-items:baseline; justify-content:space-between; margin:6px 2px 14px; }
.section-head h2{ font-size:28px; margin:0; }
.section-head .sub{ font-size:12px; color:var(--muted); font-weight:600; }

.btn{
  font-family:'Inter',sans-serif; font-weight:700; font-size:13px; cursor:pointer;
  border-radius:8px; border:1px solid var(--ink); background:var(--ink); color:#fff;
  padding:9px 16px;
}
.btn.secondary{ background:transparent; color:var(--ink); }
.btn.gold{ background:var(--gold); border-color:var(--gold); color:var(--ink); }
.btn.danger{ background:transparent; border-color:var(--red); color:var(--red); }
.btn:active{ transform:translateY(1px); }
.btn.small{ padding:6px 11px; font-size:11.5px; border-radius:6px; }

/* ---------- ROSTER ---------- */
.roster-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px; }
.player-card{
  background:var(--card); border-radius:12px; border:1px solid var(--line);
  padding:14px 12px 12px; position:relative; cursor:pointer; box-shadow:var(--shadow);
  transition:transform .12s ease;
}
.player-card:active{ transform:scale(0.98); }
.player-card .num{
  font-family:'Teko',sans-serif; font-size:46px; line-height:0.8; font-weight:700;
  color:#000000;
}
.player-card .name{ font-weight:700; font-size:14.5px; margin-top:6px; }
.player-card .tag{ font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; font-weight:600;}
.badge-c{
  position:absolute; top:10px; right:10px; background:var(--gold); color:var(--ink);
  font-family:'Teko',sans-serif; font-weight:700; font-size:14px; width:22px;height:22px;
  border-radius:50%; display:flex; align-items:center; justify-content:center;
}
.badge-gk{
  position:absolute; top:10px; right:10px; background:var(--green); color:#fff;
  font-size:9.5px; font-weight:700; letter-spacing:.04em; padding:2px 6px; border-radius:5px;
}
.player-card .mini-stats{ display:flex; gap:10px; margin-top:8px; border-top:1px dashed var(--line); padding-top:8px; }
.player-card .mini-stats div{ font-size:11px; color:var(--muted); }
.player-card .mini-stats b{ display:block; font-family:'IBM Plex Mono',monospace; font-size:14px; color:var(--ink); }

/* ---------- LIST CARDS (matches/trainings) ---------- */
.list-card{
  background:var(--card); border:1px solid var(--line); border-radius:12px;
  padding:14px 16px; margin-bottom:10px; box-shadow:var(--shadow); cursor:pointer;
}
.list-card .row1{ display:flex; justify-content:space-between; align-items:center; }
.list-card .rival{ font-weight:800; font-size:15.5px; }
.list-card .date{ font-size:11.5px; color:var(--muted); font-weight:600; }
.list-card .result{
  font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:15px;
  padding:2px 9px; border-radius:6px; background:var(--paper); border:1px solid var(--line);
}
.list-card .meta{ font-size:11.5px; color:var(--muted); margin-top:5px; }
.empty{
  text-align:center; padding:36px 16px; color:var(--muted); font-size:13.5px;
  border:1px dashed var(--line); border-radius:12px; background:rgba(255,255,255,.4);
}
.empty b{display:block; color:var(--ink); font-family:'Teko',sans-serif; font-size:22px; font-weight:600; margin-bottom:4px;}

/* ---------- LEADERBOARD ---------- */
.board{ background:var(--card); border:1px solid var(--line); border-radius:12px; overflow:hidden; margin-bottom:16px; box-shadow:var(--shadow); }
.board-head{ background:var(--stripe); color:#fff; padding:9px 14px; font-family:'Teko',sans-serif; font-size:19px; letter-spacing:.02em; display:flex; justify-content:space-between; align-items:center;}
.board-head span{ font-family:'Inter',sans-serif; font-size:10px; color:var(--gold); font-weight:700; letter-spacing:.06em; text-transform:uppercase;}
.board-row{ display:flex; align-items:center; padding:9px 14px; border-top:1px solid var(--line); gap:10px;}
.board-row:first-child{ border-top:none;}
.board-row .pos{ font-family:'IBM Plex Mono',monospace; color:var(--muted); font-size:12px; width:16px;}
.board-row .pname{ flex:1; font-weight:700; font-size:13.5px;}
.board-row .pval{ font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:16px; background:var(--paper); padding:2px 10px; border-radius:6px; border:1px solid var(--line);}

/* ---------- MODAL ---------- */
.overlay{
  position:fixed; inset:0; background:rgba(20,20,20,0.55); z-index:100;
  display:flex; align-items:flex-end; justify-content:center;
}
.modal{
  background:var(--paper); width:100%; max-width:560px; max-height:88vh; overflow-y:auto;
  border-radius:16px 16px 0 0; padding:20px 18px 26px; box-shadow:0 -8px 30px rgba(0,0,0,.3);
}
@media(min-width:600px){
  .overlay{ align-items:center; }
  .modal{ border-radius:16px; max-height:80vh; }
}
.modal-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
.modal-head h3{ font-size:26px; margin:0;}
.modal-head .x{ cursor:pointer; font-size:22px; color:var(--muted); background:none; border:none; line-height:1;}
label{ display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin:12px 0 5px;}
input[type=text],input[type=date],input[type=number],select{
  width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:8px; font-size:14.5px;
  font-family:'Inter',sans-serif; background:#fff; color:var(--ink);
}
input[type=number]{ width:64px; text-align:center; font-family:'IBM Plex Mono',monospace; font-weight:600;}
.row-flex{ display:flex; gap:10px; }
.row-flex > *{ flex:1; }
.toggle-row{ display:flex; align-items:center; gap:8px; margin-top:12px;}
.toggle-row input{ width:18px; height:18px;}
.toggle-row span{ font-size:13.5px; font-weight:600;}

table.stat-table{ width:100%; border-collapse:collapse; margin-top:10px; font-size:12.5px;}
table.stat-table th{ text-align:left; font-size:9.5px; text-transform:uppercase; color:var(--muted); padding:5px 4px; border-bottom:1px solid var(--line); font-weight:700;}
table.stat-table td{ padding:6px 4px; border-bottom:1px solid var(--line); vertical-align:middle;}
table.stat-table td.pname{ font-weight:700; font-size:13px;}
table.stat-table input[type=number]{ width:42px; padding:5px 3px; font-size:13px;}
table.stat-table input[type=checkbox]{ width:17px; height:17px;}
table.stat-table select{ padding:4px 2px; font-size:12px; width:62px;}

.footer-actions{ display:flex; gap:10px; margin-top:20px; }
.footer-actions .btn{ flex:1; text-align:center;}

.pill-toggle{ display:flex; gap:6px; margin-top:14px; }
.pill-toggle button{ flex:1; padding:8px; border-radius:8px; border:1px solid var(--line); background:#fff; font-weight:700; font-size:12px; cursor:pointer; color:var(--muted);}
.pill-toggle button.on{ background:var(--ink); color:#fff; border-color:var(--ink);}

.fab{
  position:fixed; right:18px; bottom:22px; z-index:30;
  width:54px; height:54px; border-radius:50%; background:var(--gold); color:var(--ink);
  border:none; font-size:28px; font-weight:700; box-shadow:0 6px 20px rgba(0,0,0,.25); cursor:pointer;
  font-family:'Teko',sans-serif;
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
</head>
<body>

<header class="top">
  <div class="top-row">
    <div class="top-left">
      <img class="crest" id="crestImg" src="" alt="Escudo Galdakao C.D.">
      <div class="top-text">
        <h1>Galdakao C.D.</h1>
        <p>Benjamín Beltza · Temporada 26/27</p>
      </div>
    </div>
    <div class="top-right">
      <div>
        <span id="modeLabel">Solo lectura</span>
        <button class="icon-btn locked" id="adminToggle" title="Modo entrenador">🔒</button>
      </div>
      <button class="icon-btn hidden" id="pinBtn" title="Cambiar PIN">⚙</button>
      <button class="icon-btn" id="exportBtn" title="Exportar a Excel">⬇</button>
    </div>
  </div>
</header>

<nav class="tabs">
  <button data-tab="plantilla" class="active">Plantilla</button>
  <button data-tab="partidos">Partidos</button>
  <button data-tab="entrenos">Entrenos</button>
  <button data-tab="stats">Clasificación</button>
</nav>

<main>

  <!-- PLANTILLA -->
  <section id="tab-plantilla">
    <div class="section-head"><h2>Plantilla</h2><span class="sub" id="plantillaCount"></span></div>
    <div class="roster-grid" id="rosterGrid"></div>
  </section>

  <!-- PARTIDOS -->
  <section id="tab-partidos" class="hidden">
    <div class="section-head"><h2>Partidos</h2><span class="sub" id="partidosCount"></span></div>
    <div id="matchesList"></div>
  </section>

  <!-- ENTRENOS -->
  <section id="tab-entrenos" class="hidden">
    <div class="section-head"><h2>Entrenamientos</h2><span class="sub" id="entrenosCount"></span></div>
    <div id="trainingsList"></div>
  </section>

  <!-- STATS -->
  <section id="tab-stats" class="hidden">
    <div class="section-head"><h2>Clasificación</h2><span class="sub">Temporada 26/27</span></div>

    <div class="board" style="padding:14px 14px 6px;">
      <div style="display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; flex-wrap:wrap;">
        <div class="board-head" style="padding:0; background:none; color:var(--ink);">Filtrar por competición</div>
        <select id="compFilterSelect" style="max-width:180px;">
          <option value="todos">Liga + Amistosos</option>
          <option value="Liga">Solo Liga</option>
          <option value="Amistoso">Solo Amistosos</option>
        </select>
      </div>
      <div style="display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; flex-wrap:wrap;">
        <div class="board-head" style="padding:0; background:none; color:var(--ink);">Evolución en la temporada</div>
        <select id="evoSelect" style="max-width:180px;"></select>
      </div>
      <div id="evoEmpty" class="empty hidden" style="border:none;"><b>Todavía sin partidos</b>La gráfica aparecerá cuando registres el primer partido.</div>
      <canvas id="evoChart" height="180"></canvas>
    </div>

    <div id="statsBoards"></div>
  </section>

</main>

<button class="fab hidden" id="fabAdd">+</button>

<div id="modalRoot"></div>

// El PIN nunca se guarda ni se compara en texto plano: se guarda su hash
// SHA-256. Así, aunque alguien mire el código fuente o la propia base de
// datos (Firestore), no puede leer el PIN real, solo una huella que no se
// puede revertir para recuperar el número original.
async function sha256Hex(text){
  const bytes = new TextEncoder().encode(text);
  const hashBuffer = await crypto.subtle.digest('SHA-256', bytes);
  return Array.from(new Uint8Array(hashBuffer)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function loadAll(){
  const out = {};
  for (const [k,key] of Object.entries(SKEY)){
    try{
      const snap = await getDoc(doc(db, COLLECTION, key));
      out[k] = snap.exists() ? JSON.parse(snap.data().value) : null;
    }catch(e){ console.error('load error', key, e); out[k]=null; }
  }
  return out;
}
async function save(key, value){
  try{ await setDoc(doc(db, COLLECTION, key), { value: JSON.stringify(value) }); }
  catch(e){ console.error('storage error',e); alert('No se pudo guardar: revisa la conexión o la configuración de Firebase.'); }
}

let players=[], matches=[], trainings=[];

function uid(p){ return p+Math.random().toString(36).slice(2,9); }

/* ---------------- COMPUTED STATS ---------------- */
function matchesByComp(filter){
  filter = filter || 'todos';
  if(filter==='todos') return matches;
  return matches.filter(m=> (m.competition||'Liga')===filter);
}
function playerStats(pid, filter){
  const scoped = matchesByComp(filter);
  let jugados=0, partes=0, goles=0, asist=0, encaj=0, autogoles=0;
  scoped.forEach(m=>{
    const s = m.stats[pid];
    if(s && s.played){
      jugados++; partes += (+s.partes||0); goles += (+s.goals||0); asist += (+s.assists||0);
    }
    (m.concededGoals||[]).forEach(g=>{
      if(g.portero===pid) encaj++;
      if(g.ownGoal && g.autor===pid) autogoles++;
    });
  });
  const teamGoals = scoped.reduce((sum,m)=> sum + Object.values(m.stats).reduce((a,s)=>a+(+s.goals||0),0), 0);
  const participacion = teamGoals>0 ? Math.round(((goles+asist)/teamGoals)*100) : 0;
  return { jugados, partes, goles, asist, encaj, autogoles,
    golesPP: jugados? (goles/jugados).toFixed(2):'—',
    asistPP: jugados? (asist/jugados).toFixed(2):'—',
    participacion };
}
function trainingStats(pid){
  let asistidos=0, faltasJust=0, faltas=0;
  trainings.forEach(t=>{
    const a = t.attendance[pid];
    if(a){ if(a.present) asistidos++; else { faltas++; if(a.justified) faltasJust++; } }
  });
  const total = trainings.length;
  return { asistidos, faltasJust, faltas, total, pct: total? Math.round((asistidos/total)*100):0 };
}

/* ---------------- RENDER: ROSTER ---------------- */
function renderRoster(){
  document.getElementById('plantillaCount').textContent = players.length + ' jugadores';
  const grid = document.getElementById('rosterGrid');
  grid.innerHTML='';
  players.slice().sort((a,b)=>a.number-b.number).forEach(p=>{
    const st = playerStats(p.id);
    const card = document.createElement('div');
    card.className='player-card';
    card.innerHTML = `
      ${p.captain? '<div class="badge-c">C</div>' : (p.gk? '<div class="badge-gk">PORTERO</div>' : '')}
      <div class="num">${p.number}</div>
      <div class="name">${p.name}</div>
      <div class="tag">${p.gk? 'Portero':'Jugador/a'}</div>

/* ---------------- RENDER: EVOLUTION CHART ---------------- */
let evoChartInstance = null;
function populateEvoSelect(){
  const sel = document.getElementById('evoSelect');
  const prev = sel.value;
  sel.innerHTML = `<option value="__team__">Equipo (total)</option>` +
    players.slice().sort((a,b)=>a.number-b.number).map(p=>`<option value="${p.id}">${p.number}. ${p.name}</option>`).join('');
  if(prev && [...sel.options].some(o=>o.value===prev)) sel.value = prev;
}
function renderEvoChart(){
  if(typeof Chart === 'undefined'){
    throw new Error('Chart.js no está disponible (puede que el navegador haya bloqueado el script externo)');
  }
  const sorted = matchesByComp(statsCompFilter).slice().sort((a,b)=> a.date.localeCompare(b.date));
  const emptyEl = document.getElementById('evoEmpty');
  const canvas = document.getElementById('evoChart');
  if(!sorted.length){
    emptyEl.classList.remove('hidden');
    canvas.classList.add('hidden');
    if(evoChartInstance){ evoChartInstance.destroy(); evoChartInstance=null; }
    return;
  }
  emptyEl.classList.add('hidden');
  canvas.classList.remove('hidden');

  const sel = document.getElementById('evoSelect').value || '__team__';
  const labels = sorted.map(m=> fmtDate(m.date) + (m.rival? ' vs '+m.rival : ''));
  let goles=0, asist=0;
  const golesAcum=[], asistAcum=[];
  sorted.forEach(m=>{
    if(sel==='__team__'){
      goles += Object.values(m.stats||{}).reduce((a,s)=>a+(+s.goals||0),0);
      asist += Object.values(m.stats||{}).reduce((a,s)=>a+(+s.assists||0),0);
    } else {
      const s = m.stats[sel];
      goles += s? (+s.goals||0) : 0;
      asist += s? (+s.assists||0) : 0;
    }
    golesAcum.push(goles); asistAcum.push(asist);
  });

  if(evoChartInstance) evoChartInstance.destroy();
  evoChartInstance = new Chart(canvas.getContext('2d'), {
    type:'line',
    data:{ labels, datasets:[
      { label:'Goles acumulados', data:golesAcum, borderColor:'#16181c', backgroundColor:'rgba(22,24,28,0.06)', borderWidth:2.5, tension:0.25, fill:true, pointRadius:3, pointBackgroundColor:'#16181c' },
      { label:'Asistencias acumuladas', data:asistAcum, borderColor:'#d9a441', backgroundColor:'rgba(217,164,65,0.08)', borderWidth:2.5, tension:0.25, fill:true, pointRadius:3, pointBackgroundColor:'#d9a441' }
    ]},
    options:{
      responsive:true,
      interaction:{ mode:'index', intersect:false },
      plugins:{ legend:{ position:'bottom', labels:{ font:{ family:'Inter', size:11, weight:'600' }, boxWidth:12 } } },
      scales:{
        x:{ ticks:{ font:{ family:'IBM Plex Mono', size:9 }, maxRotation:45, minRotation:45 }, grid:{ display:false } },
        y:{ beginAtZero:true, ticks:{ precision:0, font:{ family:'IBM Plex Mono', size:10 } }, grid:{ color:'#e1ddd2' } }
      }
    }
  });
}
document.getElementById('evoSelect').onchange = renderEvoChart;

let statsCompFilter = 'todos';
document.getElementById('compFilterSelect').onchange = (e)=>{
  statsCompFilter = e.target.value;
  renderStats();
};

/* ---------------- RENDER: STATS BOARDS ---------------- */
function renderStats(){
  // 1) Primero pintamos las clasificaciones. Esto NO debe depender nunca
  //    de la gráfica de evolución (Chart.js): si esa gráfica falla (por ejemplo
  //    porque la librería no ha cargado, o por un dato antiguo mal formado),
  //    antes se quedaba todo en blanco porque el error cortaba la función
  //    justo al principio, antes de dibujar las tablas.
  const root = document.getElementById('statsBoards');
  root.innerHTML='';
  const rows = players.map(p=>({p, st:playerStats(p.id, statsCompFilter), tr:trainingStats(p.id)}));

  function board(title, tag, arr, valueFn, unit){
    const sorted = arr.slice().sort((a,b)=>valueFn(b)-valueFn(a)).slice(0,13);
    const el = document.createElement('div');
    el.className='board';
    el.innerHTML = `<div class="board-head">${title}<span>${tag}</span></div>` +
      sorted.map((r,i)=>`<div class="board-row"><div class="pos">${i+1}</div><div class="pname">${r.p.name}</div><div class="pval">${valueFn(r)}${unit||''}</div></div>`).join('');
    root.appendChild(el);
  }
  if(!matches.length && !trainings.length){
    root.innerHTML = `<div class="empty"><b>Todavía no hay datos</b>Añade partidos y entrenamientos para ver las clasificaciones.</div>`;
  } else {
    board('Máximos goleadores','GOLES', rows, r=>r.st.goles);
    board('Máximos asistentes','ASIST.', rows, r=>r.st.asist);
    board('Más participativos en gol','%', rows, r=>r.st.participacion, '%');
    board('Más partidos jugados','PJ', rows, r=>r.st.jugados);
    const gkRows = rows.filter(r=>r.st.encaj>0);
    if(gkRows.length) board('Goles encajados de portero','ENC.', gkRows, r=>r.st.encaj);
    board('Mejor asistencia a entrenos','%', rows, r=>r.tr.pct, '%');
  }

  // 2) Ahora, aparte y protegida con try/catch, la gráfica de evolución.
  //    Si algo falla aquí, solo se oculta la gráfica: las clasificaciones
  //    de arriba ya se han pintado y se quedan visibles.
  try{
    populateEvoSelect();
    renderEvoChart();
  }catch(err){
    console.error('No se pudo generar la gráfica de evolución:', err);
    const emptyEl = document.getElementById('evoEmpty');
    const canvas = document.getElementById('evoChart');
    if(emptyEl) emptyEl.classList.remove('hidden');
    if(canvas) canvas.classList.add('hidden');
  }
}

      <select id="m-captain" ${dis}>
        <option value="">— usar capitán de temporada —</option>
        ${players.map(p=>`<option value="${p.id}" ${m.captain===p.id?'selected':''}>${p.name}</option>`).join('')}
      </select>

      <label style="margin-top:18px;">Convocatoria y estadísticas</label>

        <tr><th>Jugador/a</th><th>Jugó</th><th>Partes</th><th>Goles</th><th>Asist.</th></tr>

    });
    if(isNew) trainings.push(t);
    await save(SKEY.trainings, trainings);
    closeModal(); renderTrainings(); renderStats();
  };
}

/* ---------------- TABS ---------------- */
const tabButtons = document.querySelectorAll('nav.tabs button');
const sections = { plantilla:'tab-plantilla', partidos:'tab-partidos', entrenos:'tab-entrenos', stats:'tab-stats' };
let currentTab = 'plantilla';
tabButtons.forEach(btn=>{
  btn.onclick=()=>{
    currentTab = btn.dataset.tab;
    tabButtons.forEach(b=>b.classList.toggle('active', b===btn));
    Object.entries(sections).forEach(([k,id])=> document.getElementById(id).classList.toggle('hidden', k!==currentTab));
    document.getElementById('fabAdd').classList.toggle('hidden', !isAdmin || currentTab==='stats');
  };
});
document.getElementById('fabAdd').onclick=()=>{
  if(!isAdmin) return;
  if(currentTab==='partidos') openMatchModal(null);
  else if(currentTab==='entrenos') openTrainingModal(null);
  else if(currentTab==='plantilla') openPlayerModal(null);
};

/* ---------------- ADMIN MODE (solo lectura vs entrenador) ---------------- */
let isAdmin = false;
let adminPin = DEFAULT_PIN;

function applyAdminUI(){
  const toggle = document.getElementById('adminToggle');
  const label = document.getElementById('modeLabel');
  toggle.textContent = isAdmin ? '🔓' : '🔒';
  toggle.classList.toggle('locked', !isAdmin);
  toggle.classList.toggle('unlocked', isAdmin);
  label.textContent = isAdmin ? 'Modo entrenador' : 'Solo lectura';
  document.getElementById('fabAdd').classList.toggle('hidden', !isAdmin || currentTab==='stats');
  document.getElementById('pinBtn').classList.toggle('hidden', !isAdmin);
}
document.getElementById('pinBtn').onclick=async ()=>{
  const current = prompt('PIN actual:');
  if(current===null) return;
  const currentHash = await sha256Hex(current.trim());
  // Compatibilidad: si el PIN todavía estaba guardado en texto plano de una
  // versión anterior, también lo aceptamos aquí y lo migramos a hash abajo.
  if(currentHash!==adminPin && current.trim()!==adminPin){
    alert('PIN actual incorrecto.');
    return;
  }
  const nuevo = prompt('Nuevo PIN de entrenador/a:');
  if(!nuevo) return;
  adminPin = await sha256Hex(nuevo.trim());
  await save(SKEY.pin, adminPin);
  alert('PIN actualizado.');
};

document.getElementById('adminToggle').onclick=async ()=>{
  if(isAdmin){
    isAdmin = false;
    applyAdminUI();
    return;
  }
  const entered = prompt('Introduce el PIN de entrenador/a para poder editar datos:');
  if(entered===null) return;
  const enteredHash = await sha256Hex(entered.trim());
  if(enteredHash === adminPin){
    isAdmin = true;
    applyAdminUI();
  } else if(entered.trim() === adminPin){
    // PIN antiguo guardado en texto plano (versión anterior de la web):
    // se acepta una única vez y se migra automáticamente a hash.
    isAdmin = true;
    adminPin = enteredHash;
    await save(SKEY.pin, adminPin);
    applyAdminUI();
  } else {
    alert('PIN incorrecto.');
  }
};

/* ---------------- EXPORT TO EXCEL ---------------- */
function exportToExcel(){
  const wb = XLSX.utils.book_new();

  const plantillaRows = players.slice().sort((a,b)=>a.number-b.number).map(p=>({
    'Dorsal': p.number, 'Jugador/a': p.name,
    'Capitán/a': p.captain? 'Sí':'', 'Portero/a': p.gk? 'Sí':''
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(plantillaRows), 'Plantilla');

  const partidosRows = players.slice().sort((a,b)=>a.number-b.number).map(p=>{
    const st = playerStats(p.id);
    return {
      'Dorsal': p.number, 'Jugador': p.name, 'Jugados': st.jugados, 'Goles': st.goles,
      'Goles/Partido': st.golesPP, 'Asistencias': st.asist, 'Asist./Partido': st.asistPP,
      'Partes': st.partes, 'Encajados (portero)': st.encaj, 'En propia puerta': st.autogoles,
      'Participación gol %': st.participacion
    };
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(partidosRows), 'Partidos - Totales');

  const matchDetailRows = [];
  matches.slice().sort((a,b)=>a.date.localeCompare(b.date)).forEach(m=>{
    const golesAgainst = (m.concededGoals||[]).length;
    players.forEach(p=>{
      const s = m.stats[p.id];
      if(!s) return;
      matchDetailRows.push({
        'Fecha': fmtDate(m.date), 'Rival': m.rival, 'Competición': m.competition,
        'Resultado': `${m.golesFor ?? ''}-${golesAgainst}`,
        'Jugador': p.name, 'Jugó': s.played? 'Sí':'No', 'Partes': s.partes,
        'Goles': s.goals, 'Asistencias': s.assists
      });
    });
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(matchDetailRows), 'Partidos - Detalle');

  const concededRows = [];
  matches.slice().sort((a,b)=>a.date.localeCompare(b.date)).forEach(m=>{
    (m.concededGoals||[]).forEach((g,i)=>{
      concededRows.push({
        'Fecha': fmtDate(m.date), 'Rival': m.rival, '#': i+1,
        'Portero en el momento': players.find(p=>p.id===g.portero)?.name || '',
        'En propia puerta': g.ownGoal? 'Sí':'No',
        'Autor autogol': g.ownGoal? (players.find(p=>p.id===g.autor)?.name || '') : ''
      });
    });
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(concededRows), 'Goles en contra');

  const entrenoRows = players.slice().sort((a,b)=>a.number-b.number).map(p=>{
    const tr = trainingStats(p.id);
    return { 'Dorsal': p.number, 'Jugador': p.name, 'Asistidos': tr.asistidos, 'Total entrenos': tr.total,
      '%': tr.pct, 'Faltas': tr.faltas, 'Faltas justificadas': tr.faltasJust };
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(entrenoRows), 'Entrenamientos');

  const entrenoDetailRows = [];
  trainings.slice().sort((a,b)=>a.date.localeCompare(b.date)).forEach(t=>{
    players.forEach(p=>{
      const a = t.attendance[p.id];
      if(!a) return;
      entrenoDetailRows.push({ 'Fecha': fmtDate(t.date), 'Jugador': p.name,
        'Asistió': a.present? 'Sí':'No', 'Falta justificada': a.justified? 'Sí':'No' });
    });
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(entrenoDetailRows), 'Entrenamientos - Detalle');

  XLSX.writeFile(wb, `Galdakao_CD_Estadisticas_${new Date().toISOString().slice(0,10)}.xlsx`);
}
document.getElementById('exportBtn').onclick=exportToExcel;

/* ---------------- INIT ---------------- */
async function init(){
  document.getElementById('crestImg').src = CREST_DATA_URI;
  const data = await loadAll();
  players = data.players && data.players.length ? data.players : defaultPlayers();
  matches = data.matches || [];
  trainings = data.trainings || [];
  adminPin = data.pin || await sha256Hex(DEFAULT_PIN);
  if(!data.players){ await save(SKEY.players, players); }
  if(!data.pin){ await save(SKEY.pin, adminPin); }
  applyAdminUI();
  renderRoster(); renderMatches(); renderTrainings(); renderStats();
}
init();
</script>
